<div class="gym-dialog-title">
  <mat-icon>{{ isEdit ? 'edit' : 'school' }}</mat-icon>
  {{ isEdit ? 'Edit' : 'New' }} <span style="color:var(--red)">Class</span>
</div>

<mat-dialog-content>
  <form [formGroup]="form" class="gym-form">
    <mat-form-field appearance="outline" class="full-width" style="margin-bottom: 12px;">
      <mat-label>Class Name</mat-label>
      <mat-icon matPrefix>school</mat-icon>
      <input matInput formControlName="name" placeholder="e.g. Yoga, HIIT, Boxing">
      <mat-error>Name is required</mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width" style="margin-bottom: 12px;">
      <mat-label>Trainer</mat-label>
      <mat-icon matPrefix>person</mat-icon>
      <mat-select formControlName="trainer_id">
        <mat-option value="">-- No Trainer --</mat-option>
        <mat-option *ngFor="let t of trainers" [value]="t.id">{{ t.name }}</mat-option>
      </mat-select>
    </mat-form-field>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
      <mat-form-field appearance="outline" style="margin-bottom: 12px;">
        <mat-label>Capacity</mat-label>
        <mat-icon matPrefix>groups</mat-icon>
        <input matInput type="number" formControlName="capacity" min="1">
        <mat-error>Min 1</mat-error>
      </mat-form-field>
      <mat-form-field appearance="outline" style="margin-bottom: 12px;">
        <mat-label>Duration (min)</mat-label>
        <mat-icon matPrefix>timer</mat-icon>
        <input matInput type="number" formControlName="duration_minutes" min="1">
        <mat-error>Min 1</mat-error>
      </mat-form-field>
    </div>

    <mat-form-field appearance="outline" class="full-width" style="margin-bottom: 12px;">
      <mat-label>Description</mat-label>
      <mat-icon matPrefix>description</mat-icon>
      <textarea matInput formControlName="description" rows="3" placeholder="Class description..."></textarea>
    </mat-form-field>
  </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button class="gym-btn outline" style="clip-path:none" (click)="onCancel()">Cancel</button>
  <button class="gym-btn primary" (click)="onSubmit()" [disabled]="loading || form.invalid">
    {{ loading ? 'Saving...' : (isEdit ? 'Update' : 'Create') }}
  </button>
</mat-dialog-actions>
