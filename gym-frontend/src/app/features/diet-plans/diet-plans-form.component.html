<h2 mat-dialog-title>{{ isEdit ? 'Edit' : 'Add' }} Diet Plan</h2>

<mat-dialog-content>
  <form [formGroup]="form" class="form-grid" style="display:flex;flex-direction:column;gap:12px">
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Member</mat-label>
      <mat-select formControlName="member_id">
        <mat-option *ngFor="let m of members" [value]="m.id">{{ m.name }}</mat-option>
      </mat-select>
      <mat-error>Member is required</mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Trainer</mat-label>
      <mat-select formControlName="trainer_id">
        <mat-option value="">— None —</mat-option>
        <mat-option *ngFor="let t of trainers" [value]="t.id">{{ t.name }}</mat-option>
      </mat-select>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Calories</mat-label>
      <input matInput type="number" formControlName="calories" placeholder="e.g. 2000" min="100" max="10000">
      <mat-error>แคลอรี่ต้องอยู่ระหว่าง 100 - 10,000</mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Start Date</mat-label>
      <input matInput [matDatepicker]="startPicker" formControlName="start_date" placeholder="เลือกวันที่">
      <mat-datepicker-toggle matSuffix [for]="startPicker"></mat-datepicker-toggle>
      <mat-datepicker #startPicker></mat-datepicker>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>End Date</mat-label>
      <input matInput [matDatepicker]="endPicker" formControlName="end_date" placeholder="เลือกวันที่">
      <mat-datepicker-toggle matSuffix [for]="endPicker"></mat-datepicker-toggle>
      <mat-datepicker #endPicker></mat-datepicker>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Breakfast</mat-label>
      <input matInput formControlName="breakfast" placeholder="e.g. Oatmeal, eggs, fruit">
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Lunch</mat-label>
      <input matInput formControlName="lunch" placeholder="e.g. Grilled chicken, rice, salad">
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Dinner</mat-label>
      <input matInput formControlName="dinner" placeholder="e.g. Salmon, vegetables">
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Snacks</mat-label>
      <input matInput formControlName="snacks" placeholder="e.g. Protein shake, nuts">
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Notes</mat-label>
      <textarea matInput formControlName="notes" rows="3" placeholder="Additional notes..."></textarea>
    </mat-form-field>
  </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="onCancel()">Cancel</button>
  <button mat-raised-button color="primary" (click)="onSubmit()" [disabled]="loading || form.invalid">
    {{ loading ? 'Saving...' : (isEdit ? 'Update' : 'Create') }}
  </button>
</mat-dialog-actions>
