<div class="gym-dialog-title">
  <mat-icon>{{ isEdit ? 'edit' : 'fitness_center' }}</mat-icon>
  {{ isEdit ? 'Edit' : 'New' }} <span style="color:var(--red)">Equipment</span>
</div>

<mat-dialog-content>
  <form [formGroup]="form" class="gym-form">
    <mat-form-field appearance="outline" class="full-width" style="margin-bottom: 12px;">
      <mat-label>Equipment Name</mat-label>
      <mat-icon matPrefix>fitness_center</mat-icon>
      <input matInput formControlName="name" placeholder="e.g. Treadmill, Dumbbells">
      <mat-error>Name is required</mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width" style="margin-bottom: 12px;">
      <mat-label>Quantity</mat-label>
      <mat-icon matPrefix>inventory_2</mat-icon>
      <input matInput type="number" formControlName="quantity" min="0">
      <mat-error>Quantity is required (min 0)</mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width" style="margin-bottom: 12px;">
      <mat-label>Status</mat-label>
      <mat-icon matPrefix>info</mat-icon>
      <mat-select formControlName="status">
        <mat-option value="available">Available</mat-option>
        <mat-option value="maintenance">Under Maintenance</mat-option>
        <mat-option value="out_of_service">Out of Service</mat-option>
      </mat-select>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width" style="margin-bottom: 12px;">
      <mat-label>Last Maintenance</mat-label>
      <mat-icon matPrefix>build</mat-icon>
      <input matInput type="date" formControlName="last_maintenance">
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width" style="margin-bottom: 12px;">
      <mat-label>Notes</mat-label>
      <mat-icon matPrefix>notes</mat-icon>
      <textarea matInput formControlName="notes" rows="3" placeholder="Additional notes..."></textarea>
    </mat-form-field>
  </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button class="gym-btn outline" style="clip-path:none" (click)="onCancel()">Cancel</button>
  <button class="gym-btn primary" (click)="onSubmit()" [disabled]="loading || form.invalid">
    {{ loading ? 'Saving...' : (isEdit ? 'Update' : 'Create') }}
  </button>
</mat-dialog-actions>
