<div class="gym-dialog-title">
  <mat-icon>{{ isEdit ? 'edit' : 'person_add' }}</mat-icon>
  {{ isEdit ? 'Edit' : 'New' }} <span style="color:var(--red)">Member</span>
</div>

<mat-dialog-content>
  <form [formGroup]="form" class="gym-form">
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Full Name</mat-label>
      <mat-icon matPrefix>person</mat-icon>
      <input matInput formControlName="name" placeholder="ชื่อ นามสกุล">
      <mat-error>Required</mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Email</mat-label>
      <mat-icon matPrefix>alternate_email</mat-icon>
      <input matInput type="email" formControlName="email">
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Phone</mat-label>
      <mat-icon matPrefix>phone</mat-icon>
      <input matInput formControlName="phone" placeholder="08x-xxx-xxxx">
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Membership Type</mat-label>
      <mat-icon matPrefix>card_membership</mat-icon>
      <mat-select formControlName="membership_type">
        <mat-option value="monthly">Monthly</mat-option>
        <mat-option value="yearly">Yearly</mat-option>
        <mat-option value="trial">Trial</mat-option>
      </mat-select>
    </mat-form-field>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
      <mat-form-field appearance="outline">
        <mat-label>Start Date</mat-label>
        <input matInput type="date" formControlName="start_date">
      </mat-form-field>
      <mat-form-field appearance="outline">
        <mat-label>End Date</mat-label>
        <input matInput type="date" formControlName="end_date">
      </mat-form-field>
    </div>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Status</mat-label>
      <mat-select formControlName="status">
        <mat-option value="active">Active</mat-option>
        <mat-option value="inactive">Inactive</mat-option>
        <mat-option value="expired">Expired</mat-option>
      </mat-select>
    </mat-form-field>
  </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button class="gym-btn outline" style="clip-path:none" (click)="onCancel()">Cancel</button>
  <button class="gym-btn primary" (click)="onSubmit()" [disabled]="loading || form.invalid">
    {{ loading ? 'Saving...' : (isEdit ? 'Update' : 'Create') }}
  </button>
</mat-dialog-actions>
