<div class="gym-dialog-title">
  <mat-icon>{{ isEdit ? 'edit' : 'event' }}</mat-icon>
  {{ isEdit ? 'Edit' : 'New' }} <span style="color:var(--red)">Schedule</span>
</div>

<mat-dialog-content>
  <form [formGroup]="form" class="gym-form">
    <mat-form-field appearance="outline" class="full-width" style="margin-bottom: 12px;">
      <mat-label>Class</mat-label>
      <mat-icon matPrefix>school</mat-icon>
      <mat-select formControlName="class_id" required>
        <mat-option value="">-- Select Class --</mat-option>
        <mat-option *ngFor="let c of classes" [value]="c.id">{{ c.name }}</mat-option>
      </mat-select>
      <mat-error>Class is required</mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width" style="margin-bottom: 12px;">
      <mat-label>Member</mat-label>
      <mat-icon matPrefix>person</mat-icon>
      <mat-select formControlName="member_id" required>
        <mat-option value="">-- Select Member --</mat-option>
        <mat-option *ngFor="let m of members" [value]="m.id">{{ m.name }} ({{ m.email }})</mat-option>
      </mat-select>
      <mat-error>Member is required</mat-error>
    </mat-form-field>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px">
      <mat-form-field appearance="outline">
        <mat-label>Date</mat-label>
        <input matInput [matDatepicker]="picker" formControlName="schedule_date">
        <mat-datepicker-toggle matSuffix [for]="picker"></mat-datepicker-toggle>
        <mat-datepicker #picker></mat-datepicker>
        <mat-error>Date is required</mat-error>
      </mat-form-field>
      <mat-form-field appearance="outline">
        <mat-label>Time</mat-label>
        <input matInput type="time" formControlName="schedule_time">
        <mat-error>Time is required</mat-error>
      </mat-form-field>
    </div>

    <mat-form-field appearance="outline" class="full-width" style="margin-bottom: 12px;">
      <mat-label>Status</mat-label>
      <mat-icon matPrefix>info</mat-icon>
      <mat-select formControlName="status">
        <mat-option value="booked">Booked</mat-option>
        <mat-option value="completed">Completed</mat-option>
        <mat-option value="cancelled">Cancelled</mat-option>
      </mat-select>
    </mat-form-field>
  </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button class="gym-btn outline" style="clip-path:none" (click)="onCancel()">Cancel</button>
  <button class="gym-btn primary" (click)="onSubmit()" [disabled]="loading || form.invalid">
    {{ loading ? 'Saving...' : (isEdit ? 'Update' : 'Create') }}
  </button>
</mat-dialog-actions>
