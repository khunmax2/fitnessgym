<h2 mat-dialog-title>{{ isEdit ? 'Edit' : 'Add' }} Trainer</h2>

<mat-dialog-content>
  <form [formGroup]="form" class="form-grid" style="display: grid; gap: 12px;">
    <ng-container *ngIf="!isEdit">
      <mat-form-field appearance="outline" class="full-width" style="margin-bottom: 12px;">
        <mat-label>Select pending user</mat-label >
        <mat-select [(value)]="selectedPendingUserId" (selectionChange)="onPendingUserSelected()" required>
          <mat-option [value]="null">-- choose user --</mat-option>
          <mat-option *ngFor="let u of pendingUsers" [value]="u.id">
            {{ u.name || 'No name' }} - {{ u.email }}
          </mat-option>
        </mat-select>
      </mat-form-field>
      <!-- <p style="font-size: 0.9rem; color: #888; margin-top: -10px;">Name, Email, Phone are auto-filled and read-only</p> -->
    </ng-container>

    <ng-container *ngIf="isEdit || selectedPendingUser">
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Name</mat-label>
        <input matInput formControlName="name" readonly>
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Email</mat-label>
        <input matInput type="email" formControlName="email" readonly>
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Phone</mat-label>
        <input matInput formControlName="phone" readonly>
      </mat-form-field>
    </ng-container>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Specialty</mat-label>
      <input matInput formControlName="specialty" placeholder="e.g. yoga, weightlifting">
      <mat-error>Specialty is required</mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Bio</mat-label>
      <textarea matInput formControlName="bio" placeholder="Short bio"></textarea>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Status</mat-label>
      <mat-select formControlName="status">
        <mat-option value="active">Active</mat-option>
        <mat-option value="inactive">Inactive</mat-option>
      </mat-select>
    </mat-form-field>
  </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="onCancel()">Cancel</button>
  <button mat-raised-button color="primary" (click)="onSubmit()" [disabled]="loading || form.invalid">
    {{ loading ? 'Saving...' : (isEdit ? 'Update' : 'Create') }}
  </button>
</mat-dialog-actions>
